name: Pull from DockerHub and Push to ECR

on:
  workflow_dispatch:
  push:
   branches:
      - main       # run manually, or change to push/PR if needed

jobs:
  dockerhub-to-ecr:
    runs-on: self-hosted

    steps:
      # 1. Checkout repo (not strictly needed if only pulling/pushing images)
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # change to your AWS region

      # 4. Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Pull image from Docker Hub
      - name: Pull image from Docker Hub
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/dokop:v1

      # 6. Tag image for ECR
      - name: Tag image for ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY=harikrishnan/my-devops-repo   # replace with your ECR repo name
          docker tag ${{ vars.DOCKER_USERNAME }}/dokop:v1 $ECR_REGISTRY/$ECR_REPOSITORY:v1

      # 7. Push image to ECR
      - name: Push image to ECR
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY=harikrishnan/my-devops-repo
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:v1
